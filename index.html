<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <html lang="pt-BR">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <title>Portfólio</title>

    <style>
        :root {
            --accent: #c8b97a;
        }

        * {
            margin: 0;
        }

        body {
            background: #080808;
            overflow-x: hidden;
            color: rgb(240, 240, 240);
            position: relative;
            font-family: 'Barlow Condensed', sans-serif;
            cursor: none;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
        }

        h2 {
            font-family: 'Share Tech Mono', monospace;
        }

        p {
            font-size: 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");

            opacity: 0.35;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url(imagens/nave.png);
            background-size: 300px;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: ease 0.1s;
            z-index: 10;
            pointer-events: none;
            transform:
                translateY(var(--ship-y, 0px)) translateX(var(--ship-x, 0px)) rotate(var(--ship-rotate, 0px));
        }

        body.show::after {
            opacity: 0.6;
        }

        header {
            background: rgb(22, 22, 22);
            opacity: 0.7;
            height: 1vh;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 3%;
            padding-bottom: 2%;
            padding-top: 2%;
            border-bottom: 2px solid rgb(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);

        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            z-index: 0;

            pointer-events: none;
        }

        .inicio {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            border: 2px solid rgb(255, 255, 255, 0.4);
            border-top: none;
            min-height: 90vh;
            width: calc(100% - 48px);
            justify-self: center;
            position: relative;
            z-index: 10;
        }

        .inicio h1 {
            position: absolute;
            top: 20%;
            right: 17%;
            font-size: 20rem;
            z-index: 2;
            line-height: 16rem;
        }

        .inicio span {
            margin-left: 3rem;
        }

        .inicio h2 {
            font-size: 3.5rem;
        }

        .inicio p {
            font-size: 1.8rem;
        }

        .traco {
            background: white;
            width: 100%;
            height: 2px;
        }

        .rodape {
            position: absolute;
            bottom: 1%;

        }

        .rodape p {
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .inicio img {
            width: 500px;
            height: auto;
            position: absolute;
            z-index: 3;
            right: -2%;
            bottom: 0;
            mask-image:
                linear-gradient(to left, black 70%, transparent 100%),
                linear-gradient(to top, black 82%, transparent 100%);
            mask-composite: intersect;
            -webkit-mask-image:
                linear-gradient(to left, black 70%, transparent 100%),
                linear-gradient(to top, black 82%, transparent 100%);
            -webkit-mask-composite: source-in;
            filter: contrast(1.05) brightness(0.9);
        }

     .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
      mix-blend-mode: difference;
      transform: translate(-50%, -50%);
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: all 0.25s ease;
      opacity: 0.6;
      transform: translate(-50%, -50%);
    }
        @media (pointer: coarse) {

            .cursor,
            .cursor-ring {
                display: none;
            }

            body {
                cursor: auto;
            }
        }
    </style>
</head>

<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <canvas id="stars"></canvas>

    <header>
        <p>Session_01</p>
        <p>19.9167S, 43.9345W<br>
            35.6762N, 139.6503</p>
    </header>

    <section class="inicio">
        <div style="margin-left: 3%;">
            <h2>Front-end Designer</h2>
            <div class="traco"></div>
            <p>You're going to carry that weight.</p>
            <div class="rodape">
                <p>Cowboy / UI e UX</p>
                <p>Bebop / 2071</p>
            </div>
        </div>
        <div>
            <h1>Pedro<br><span>Neres</span></h1>
            <img src="imagens/spike.png">
        </div>
    </section>


    <div style="height: 10000px;"></div>
</body>


<script src="js/js.js"></script>
